<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xtensio — What Are You Building?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .template-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 8px;
    }
    .template-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 28px 16px 24px;
      gap: 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      background: #fff;
    }
    .template-card:hover {
      border-color: var(--color-primary);
      box-shadow: 0 2px 8px rgba(238, 114, 113, 0.12);
    }
    .template-card.selected {
      border-color: var(--color-primary);
      background: rgba(238, 114, 113, 0.04);
    }
    .template-card.ai-card {
      border-style: dashed;
      background: #fafafa;
    }
    .template-card.ai-card:hover {
      border-style: solid;
      background: rgba(238,114,113,0.03);
    }
    .template-icon {
      font-size: 28px;
      flex-shrink: 0;
    }
    .template-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-navy);
      line-height: 1.3;
    }
    .ai-hint {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--color-text-faint);
      margin-top: 2px;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="page-inner" style="max-width: 520px;">

    <div class="logo-wrap" style="margin-bottom: 16px;">
      <img src="https://xtensio.com/wp-content/themes/Divi-child/images/xtensio.svg" alt="Xtensio" class="logo">
    </div>

    <h1 class="heading mb-12" style="text-align: center;">What are you building first?</h1>
    <p class="subheading" style="text-align: center; margin-bottom: 24px;">Pick a starting point — AI will draft it, you make it yours.</p>

    <div class="template-grid">

      <div class="template-card" onclick="pick(this)">
        <div class="template-icon" style="color: var(--color-primary);"><i class="fa-solid fa-file-signature"></i></div>
        <div class="template-name">Consulting Proposal</div>
      </div>

      <div class="template-card" onclick="pick(this)">
        <div class="template-icon" style="color: var(--color-navy);"><i class="fa-solid fa-file-lines"></i></div>
        <div class="template-name">Startup One-Pager</div>
      </div>

      <div class="template-card" onclick="pick(this)">
        <div class="template-icon" style="color: var(--color-success);"><i class="fa-solid fa-chart-line"></i></div>
        <div class="template-name">Pitch Deck</div>
      </div>

      <div class="template-card" onclick="pick(this)">
        <div class="template-icon" style="color: var(--color-blue);"><i class="fa-solid fa-list-check"></i></div>
        <div class="template-name">Fact Sheet</div>
      </div>

      <div class="template-card" onclick="pick(this)">
        <div class="template-icon" style="color: var(--color-primary);"><i class="fa-solid fa-magnifying-glass-chart"></i></div>
        <div class="template-name">Case Study</div>
      </div>

      <div class="template-card" onclick="pick(this)">
        <div class="template-icon" style="color: var(--color-navy);"><i class="fa-solid fa-medal"></i></div>
        <div class="template-name">Capability Statement</div>
      </div>

      <div class="template-card" onclick="pick(this)">
        <div class="template-icon" style="color: var(--color-success);"><i class="fa-solid fa-chart-bar"></i></div>
        <div class="template-name">Monthly Report</div>
      </div>

      <div class="template-card" onclick="pick(this)">
        <div class="template-icon" style="color: var(--color-blue);"><i class="fa-solid fa-bullseye"></i></div>
        <div class="template-name">Project Proposal</div>
      </div>

      <div class="template-card ai-card" onclick="pick(this)">
        <div class="template-icon" style="color: var(--color-primary);"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
        <div>
          <div class="template-name">Generate Anything</div>
          <div class="ai-hint">Describe what you need</div>
        </div>
      </div>

    </div>

    <p class="small-note" style="margin-top: 16px;">
      or <a href="setup-1.html" class="link">I'll decide later →</a>
    </p>

  </div>
</div>

<script>
  function pick(el) {
    document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    setTimeout(() => window.location.href = 'setup-1.html', 120);
  }
</script>
</body>
</html>
