<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xtensio — Set Up Your Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="page">
  <div class="page-inner">

    <div class="logo-wrap">
      <img src="https://xtensio.com/wp-content/themes/Divi-child/images/xtensio.svg" alt="Xtensio" class="logo">
    </div>

    <div class="progress-wrap">
      <div class="step-dot active"></div>
      <div class="step-dot upcoming"></div>
      <div class="step-dot upcoming"></div>
    </div>

    <h1 class="heading" style="margin-bottom: 10px; text-align: left;">Set up your workspace</h1>
    <p class="subheading" style="text-align: left; margin-bottom: 28px;">Your team works here. Clients access everything you share — all under your brand, at your own URL.</p>

    <div class="form-group" style="margin-top: 0;">
      <label class="form-label" for="team-name">Team or company name</label>
      <p class="form-helper">Appears on your workspace.</p>
      <input
        class="form-input"
        type="text"
        id="team-name"
        placeholder="e.g. Acme Design Studio"
        oninput="updateSlug(this.value)"
      >
    </div>

    <div class="form-group" style="margin-bottom: 20px;">
      <label class="form-label" for="workspace-slug">Workspace URL</label>
      <p class="form-helper">Your work lives here.</p>
      <div class="slug-row">
        <input
          class="slug-input"
          type="text"
          id="workspace-slug"
          placeholder="acme-design"
          oninput="validateSlug(this)"
        >
        <div class="slug-suffix">.xtensio.com</div>
      </div>
      <p id="slug-hint" style="font-size: 13px; margin-top: 8px; min-height: 18px;"></p>
    </div>

    <a href="setup-2.html" class="btn">Next — Brand kit →</a>

    <a href="setup-2.html" class="skip-link">Skip for now</a>

  </div>
</div>

<script>
  function updateSlug(val) {
    const slug = val.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    document.getElementById('workspace-slug').value = slug;
    validateSlug(document.getElementById('workspace-slug'));
  }

  function validateSlug(input) {
    const hint = document.getElementById('slug-hint');
    const val = input.value;
    if (!val) { hint.textContent = ''; return; }
    const clean = val.toLowerCase().replace(/[^a-z0-9-]/g, '');
    if (clean !== val) input.value = clean;
    hint.innerHTML = '<span style="color:var(--color-success);font-weight:500;">' + clean + '.xtensio.com</span> — looks good';
  }
</script>
</body>
</html>
