<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xtensio — Set Up Your Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius);
      padding: 14px 16px;
      background: #fff;
      cursor: default;
    }
    .brand-logo-icon {
      width: 40px;
      height: 40px;
      background: #1a2b6d;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 18px;
      flex-shrink: 0;
    }
    .brand-info { flex: 1; min-width: 0; }
    .brand-info-name { font-size: 14px; font-weight: 600; color: var(--color-navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand-info-source { font-size: 12px; color: var(--color-text-faint); margin-top: 1px; }
    .brand-color-dots { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
    .color-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
    .slug-preview {
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-top: 8px;
      line-height: 1.4;
    }
    .slug-preview span {
      font-weight: 600;
      color: var(--color-navy);
    }
    .setup-divider {
      border: none;
      border-top: 1px solid #f0f2f5;
      margin: 24px 0 20px;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="page-inner" style="max-width: 480px;">

    <div class="logo-wrap" style="margin-bottom: 20px;">
      <img src="https://xtensio.com/wp-content/themes/Divi-child/images/xtensio.svg" alt="Xtensio" class="logo">
    </div>

    <h1 class="heading" style="font-size: 28px; text-align: left; margin-bottom: 8px;">Set up your workspace</h1>
    <p class="subheading" style="text-align: left; font-size: 15px; margin-bottom: 28px;">Your team and clients will work from here.</p>

    <!-- Name input -->
    <div class="form-group" style="margin-top: 0; margin-bottom: 4px;">
      <label class="form-label" for="team-name">Team or company name</label>
      <input
        class="form-input"
        type="text"
        id="team-name"
        placeholder="e.g. Acme Design Studio"
        oninput="updateSlug(this.value)"
        autocomplete="off"
      >
    </div>

    <!-- Auto-generated URL preview -->
    <p class="slug-preview" id="slug-preview-text">
      Your workspace will be at <span id="slug-preview">your-name.xtensio.com</span>
      <a href="#" class="link" id="edit-slug-link" style="font-size: 13px; margin-left: 6px;" onclick="toggleSlug(event)">Edit</a>
    </p>

    <!-- Editable slug (hidden by default) -->
    <div id="slug-row-wrap" style="display: none; margin-top: 10px;">
      <div class="slug-row">
        <input
          class="slug-input"
          type="text"
          id="workspace-slug"
          placeholder="acme-design"
          oninput="validateSlug(this)"
        >
        <div class="slug-suffix">.xtensio.com</div>
      </div>
    </div>

    <hr class="setup-divider">

    <!-- Brand section -->
    <div class="section-label" style="margin-bottom: 12px;">Your brand</div>

    <div class="brand-row">
      <div class="brand-logo-icon">A</div>
      <div class="brand-info">
        <div class="brand-info-name">Acme Design Studio</div>
        <div class="brand-info-source">Fetched from acmestudio.com</div>
      </div>
      <div class="brand-color-dots">
        <span class="color-dot" style="background: #1a2b6d;" title="Primary"></span>
        <span class="color-dot" style="background: #e8a020;" title="Secondary"></span>
        <span class="color-dot" style="background: #0f172a;" title="Dark"></span>
        <span class="color-dot" style="background: #f8fafc; border: 1px solid #e5e7eb;" title="Light"></span>
      </div>
      <a href="#" class="link" style="font-size: 13px; flex-shrink: 0; margin-left: 8px;">Change</a>
    </div>
    <p style="font-size: 12px; color: var(--color-text-faint); margin-top: 8px;">
      You can update branding anytime from workspace settings.
    </p>

    <a href="allset.html" class="btn" style="margin-top: 28px;">Enter my workspace →</a>
    <a href="allset.html" class="skip-link">Set up later</a>

  </div>
</div>

<script>
  function updateSlug(val) {
    const slug = val.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'your-name';
    document.getElementById('slug-preview').textContent = slug + '.xtensio.com';
    if (document.getElementById('workspace-slug')) {
      document.getElementById('workspace-slug').value = slug;
    }
  }

  function toggleSlug(e) {
    e.preventDefault();
    const wrap = document.getElementById('slug-row-wrap');
    const link = document.getElementById('edit-slug-link');
    const showing = wrap.style.display !== 'none';
    wrap.style.display = showing ? 'none' : 'block';
    link.textContent = showing ? 'Edit' : 'Done';
    document.getElementById('slug-preview-text').style.display = showing ? '' : 'none';
  }

  function validateSlug(input) {
    const val = input.value;
    const clean = val.toLowerCase().replace(/[^a-z0-9-]/g, '');
    if (clean !== val) input.value = clean;
  }
</script>
</body>
</html>
