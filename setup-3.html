<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xtensio — Invite Your Team</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="page">
  <div class="page-inner">

    <div class="logo-wrap">
      <div class="brand-swap">
        <div class="bs-initial">A</div>
        <span class="bs-name">Acme Design Studio</span>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="step-dot done"></div>
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
    </div>

    <h1 class="heading" style="margin-bottom: 10px; text-align: left;">Bring your team</h1>
    <p class="subheading" style="text-align: left; margin-bottom: 4px;">Everyone works in one shared workspace — one brand, one place.</p>
    <p style="font-size: 14px; color: var(--color-text-secondary); font-style: italic; text-align: left; margin-bottom: 0;">You can always do this later.</p>

    <div class="form-group" style="margin-top: 20px; margin-bottom: 8px;">
      <label class="form-label">Teammate email addresses</label>
      <div id="invite-rows">
        <div class="invite-row">
          <input class="form-input" type="email" placeholder="colleague@yourcompany.com">
          <button class="remove-btn" onclick="removeRow(this)" title="Remove">×</button>
        </div>
        <div class="invite-row">
          <input class="form-input" type="email" placeholder="colleague@yourcompany.com">
          <button class="remove-btn" onclick="removeRow(this)" title="Remove">×</button>
        </div>
        <div class="invite-row">
          <input class="form-input" type="email" placeholder="colleague@yourcompany.com">
          <button class="remove-btn" onclick="removeRow(this)" title="Remove">×</button>
        </div>
      </div>
    </div>

    <button class="add-link" onclick="addRow()" style="margin-bottom: 20px;">
      + Add another
    </button>

    <button class="btn" onclick="window.location.href='confirm.html?for=icp'">
      Send invites &amp; continue →
    </button>

    <a href="confirm.html?for=icp" class="skip-link">Skip — confirm your email</a>

  </div>
</div>

<script>
  function addRow() {
    const rows = document.getElementById('invite-rows');
    const div = document.createElement('div');
    div.className = 'invite-row';
    div.innerHTML = '<input class="form-input" type="email" placeholder="colleague@yourcompany.com"><button class="remove-btn" onclick="removeRow(this)" title="Remove">×</button>';
    rows.appendChild(div);
  }

  function removeRow(btn) {
    const rows = document.querySelectorAll('.invite-row');
    if (rows.length === 1) return;
    btn.closest('.invite-row').remove();
  }
</script>
</body>
</html>
