<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xtensio — You're All Set</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .allset-check {
      width: 52px;
      height: 52px;
      background: rgba(0, 189, 156, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: var(--color-success);
      font-size: 22px;
      font-weight: 800;
    }
    .allset-meta {
      font-size: 14px;
      color: var(--color-text-secondary);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .allset-meta strong { color: var(--color-navy); font-weight: 600; }
    .trial-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #00956d;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="page-inner" style="max-width: 440px; text-align: center;">

    <div class="logo-wrap" style="margin-bottom: 20px;">
      <div class="brand-swap">
        <div class="bs-initial">A</div>
        <span class="bs-name">Acme Design Studio</span>
      </div>
    </div>

    <div class="allset-check">✓</div>

    <h1 class="heading" style="margin-bottom: 14px;">You're all set.</h1>

    <div class="trial-pill">
      <span>●</span> Business Class unlocked — 14 days, all features
    </div>

    <p class="allset-meta">
      <strong>Acme Design Studio</strong> is ready.<br>
      Invite your team, start building, and share your first deliverable — all from one place.
    </p>

    <a href="index.html" class="btn">Go to my workspace →</a>

  </div>
</div>
</body>
</html>
