<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xtensio — You're All Set</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .allset-meta {
      font-size: 14px;
      color: var(--color-text-secondary);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .allset-meta strong { color: var(--color-navy); font-weight: 600; }
    .trial-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--color-success);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
<div style="position: fixed; top: 16px; right: 20px; font-size: 12px; color: var(--color-text-faint); z-index: 100;">
  <span style="font-weight: 600; color: var(--color-navy);">Branded</span>
  <span style="margin: 0 6px;">·</span>
  <a href="allset-generic.html" class="link">Generic</a>
</div>
<div class="page" style="justify-content: center;">
  <div class="page-inner" style="max-width: 440px; text-align: center;">

    <div class="logo-wrap" style="margin-bottom: 20px;">
      <div class="brand-swap">
        <div class="bs-initial">A</div>
        <span class="bs-name">Acme Design Studio</span>
      </div>
    </div>

    <h1 class="heading" style="margin-bottom: 14px;">Acme Design Studio is ready.</h1>

    <div class="trial-pill">
      <span>●</span> Business Class unlocked — 14 days, all features
    </div>

    <p class="allset-meta">
      Start building and share your first deliverable as a live link.
    </p>

    <a href="index.html" class="btn" id="workspace-btn">Go to my workspace →</a>
    <a href="#" class="skip-link" style="color: var(--color-blue);">Invite a teammate →</a>

    <p id="redirect-note" style="font-size: 12px; color: var(--color-text-faint); margin-top: 20px;">
      Redirecting to your workspace in <span id="countdown">5</span> seconds…
    </p>

  </div>
</div>
<script>
  let n = 5;
  const tick = setInterval(() => {
    n--;
    document.getElementById('countdown').textContent = n;
    if (n <= 0) { clearInterval(tick); window.location.href = 'index.html'; }
  }, 1000);
  document.getElementById('workspace-btn').addEventListener('click', () => clearInterval(tick));
</script>
</body>
</html>
