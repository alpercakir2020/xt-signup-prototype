<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xtensio — Get Started</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .survey-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }
    .survey-option {
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 28px 16px 24px;
      gap: 14px;
      min-height: 180px;
      justify-content: flex-start;
    }
    .survey-icon { font-size: 30px; }
    .survey-option-title { font-size: 14px; }
    .survey-option-desc { font-size: 12px; }
  </style>
</head>
<body>
<div class="page">
  <div class="page-inner">

    <div class="logo-wrap">
      <img src="https://xtensio.com/wp-content/themes/Divi-child/images/xtensio.svg" alt="Xtensio" class="logo">
    </div>

    <h1 class="heading mb-12">What brings you here?</h1>

    <div class="survey-options">

      <div class="survey-option" data-value="icp" onclick="navigate(this)">
        <div class="survey-icon" style="color: var(--color-primary);">
          <i class="fa-solid fa-briefcase"></i>
        </div>
        <div>
          <div class="survey-option-title">Work or business</div>
          <div class="survey-option-desc">Client deliverables, proposals, company projects</div>
        </div>
      </div>

      <div class="survey-option" data-value="student" onclick="navigate(this)">
        <div class="survey-icon" style="color: var(--color-blue);">
          <i class="fa-solid fa-graduation-cap"></i>
        </div>
        <div>
          <div class="survey-option-title">School or education</div>
          <div class="survey-option-desc">Assignments, presentations, coursework</div>
        </div>
      </div>

      <div class="survey-option" data-value="personal" onclick="navigate(this)">
        <div class="survey-icon" style="color: var(--color-success);">
          <i class="fa-solid fa-seedling"></i>
        </div>
        <div>
          <div class="survey-option-title">Personal projects</div>
          <div class="survey-option-desc">Portfolio, side projects, exploring ideas</div>
        </div>
      </div>

    </div>

  </div>
</div>

<script>
  function navigate(el) {
    document.querySelectorAll('.survey-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    const dest = el.dataset.value === 'icp' ? 'unlock.html' : 'confirm.html?for=free';
    setTimeout(() => window.location.href = dest, 120);
  }
</script>
</body>
</html>
